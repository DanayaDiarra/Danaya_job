services:
  - type: web
    name: job-agent-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # set manually in Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_REPO
        value: DanayaDiarra/Danaya_job
      - key: GROQ_API_KEY
        sync: false
      - key: DB_PATH
        value: data/jobs.db
      - key: SCORE_THRESHOLD
        value: "70"
